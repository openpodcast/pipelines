name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test ${{ matrix.pipeline }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pipeline:
          - anchor
          - apple
          - connector_manager
          - podigee
          - spotify
    defaults:
      run:
        working-directory: ./${{ matrix.pipeline }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.pipeline }}/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v
