name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test ${{ matrix.pipeline }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pipeline:
          - anchor
          - apple
          - connector_manager
          - podigee
          - spotify
    defaults:
      run:
        working-directory: ./${{ matrix.pipeline }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (connector_manager only)
        if: matrix.pipeline == 'connector_manager'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gnupg2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.pipeline }}/uv.lock

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run tests
        run: uv run pytest -v
