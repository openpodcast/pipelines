name: Docker

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "main"

env:
  DOCKER_PLATFORMS: linux/amd64,linux/arm64/v8

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    # Don't run on forks
    if: >-
      github.repository_owner == 'openpodcast' &&
      github.actor != 'dependabot[bot]' &&
      ( github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.owner.login == github.event.pull_request.base.repo.owner.login )
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: openpodcast/anchor-connector
            context: anchor
            dockerfile: anchor/Dockerfile
            readme: anchor/README.md
          - image: openpodcast/apple-connector
            context: apple
            dockerfile: apple/Dockerfile
            readme: apple/README.md
          - image: openpodcast/podigee-connector
            context: podigee
            dockerfile: podigee/Dockerfile
            readme: podigee/README.md
          - image: openpodcast/spotify-connector
            context: spotify
            dockerfile: spotify/Dockerfile
            readme: spotify/README.md
          - image: openpodcast/connector-manager
            context: .
            dockerfile: ./Dockerfile
            readme: README.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ matrix.image }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Update DockerHub description
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ matrix.image }}
          readme-filepath: ${{ matrix.readme }}